<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Offline · Jogos Reduzidos</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0d1117;
      color: #c9d1d9;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
    }
    .container { max-width: 400px; }
    .icon {
      width: 64px; height: 64px; border-radius: 50%;
      background: linear-gradient(135deg, #00e676, #00b0ff);
      display: flex; align-items: center; justify-content: center;
      font-size: 28px; font-weight: 900; color: #000;
      margin: 0 auto 20px;
    }
    h1 { font-size: 18px; color: #fff; margin-bottom: 8px; }
    p { font-size: 13px; line-height: 1.6; color: #8a9bb0; margin-bottom: 16px; }
    .hint { font-size: 11px; color: #6a7a8a; }
    button {
      margin-top: 16px; padding: 10px 24px;
      background: #00e676; color: #000; border: none; border-radius: 8px;
      font-size: 13px; font-weight: 700; cursor: pointer;
    }
    button:hover { background: #00c853; }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">JR</div>
    <h1>Sem conexão</h1>
    <p>O aplicativo Jogos Reduzidos precisa de conexão para carregar pela primeira vez. Se você já o utilizou antes, tente recarregar — os dados podem estar em cache.</p>
    <button onclick="location.reload()">Tentar novamente</button>
    <p class="hint">Dica: instale o app para garantir acesso offline completo aos dados.</p>
  </div>
</body>
</html>
